<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Артефакт</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        }
        
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            max-width: 500px;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            position: relative;
            backdrop-filter: blur(10px);
        }
        
        .cover {
            width: 100%;
            height: 180px;
            background-size: cover;
            background-position: center;
            background-color: #f0f0f0;
            position: relative;
        }
        
        .cover::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(to bottom, transparent 50%, rgba(255,255,255,0.95) 100%);
        }
        
        .cover.error {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        .logo {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid white;
            margin: -60px auto 15px;
            background-size: cover;
            background-position: center;
            background-color: #f0f0f0;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            position: relative;
            z-index: 2;
            transition: transform 0.3s;
        }
        
        .logo:hover {
            transform: scale(1.05);
        }
        
        .logo.error {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 40px;
        }
        
        .content {
            padding: 0 25px 35px;
            text-align: center;
        }
        
        .title {
            font-size: 28px;
            font-weight: 700;
            color: #333;
            margin-bottom: 8px;
            animation: fadeInUp 0.5s ease;
        }
        
        .description {
            font-size: 16px;
            color: #666;
            margin-bottom: 25px;
            line-height: 1.5;
            animation: fadeInUp 0.5s ease 0.1s both;
        }
        
        .buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 10px;
        }
        
        .button {
            display: block;
            padding: 18px 25px;
            border-radius: 15px;
            text-decoration: none;
            color: white;
            font-weight: 600;
            font-size: 16px;
            text-align: center;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            border: none;
            cursor: pointer;
            letter-spacing: 0.5px;
            position: relative;
            overflow: hidden;
            animation: fadeInUp 0.5s ease forwards;
            opacity: 0;
        }
        
        .button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }
        
        .button:hover::before {
            left: 100%;
        }
        
        .button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }
        
        .button:active {
            transform: translateY(0);
        }
        
        /* Анимация для кнопок */
        .button:nth-child(1) { animation-delay: 0.2s; }
        .button:nth-child(2) { animation-delay: 0.3s; }
        .button:nth-child(3) { animation-delay: 0.4s; }
        .button:nth-child(4) { animation-delay: 0.5s; }
        .button:nth-child(5) { animation-delay: 0.6s; }
        .button:nth-child(6) { animation-delay: 0.7s; }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .loader {
            text-align: center;
            padding: 50px 20px;
            color: #666;
        }
        
        .loader-spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .error {
            text-align: center;
            padding: 50px 20px;
            color: #ff4444;
            background: rgba(255, 68, 68, 0.1);
            border-radius: 15px;
            margin-top: 20px;
        }
        
        .error i {
            font-size: 50px;
            margin-bottom: 15px;
            display: block;
        }
        
        .footer {
            text-align: center;
            margin-top: 30px;
            font-size: 14px;
            color: #999;
        }
        
        .last-update {
            text-align: center;
            font-size: 12px;
            color: #ccc;
            margin-top: 15px;
        }
        
        /* Заглушка для изображений */
        .cover-placeholder, .logo-placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .logo-placeholder {
            font-size: 40px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="cover" class="cover">
            <div class="cover-overlay"></div>
        </div>
        <div id="logo" class="logo"></div>
        
        <div class="content">
            <h1 id="title" class="title"></h1>
            <p id="description" class="description"></p>
            
            <div id="buttonsContainer" class="buttons">
                <div class="loader">
                    <div class="loader-spinner"></div>
                    <p>Загрузка данных...</p>
                </div>
            </div>
            
            <div class="footer">
                <!-- <p>© 2024 Все права защищены</p> -->
                <div id="lastUpdate" class="last-update"></div>
            </div>
        </div>
    </div>
    
    <script>
        // Ваш URL из Google Apps Script
        const API_URL = 'https://script.google.com/macros/s/AKfycbwSfivNw0k3gj7bdvQYMxrqtczv7ZXPi2QwyPJG8QQyYDvEYCJJLGb0XG0BHN2ft5qj/exec';
        
        async function loadData() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                if (data.error) {
                    showError(data.error);
                    return;
                }
                
                displayData(data);
                
            } catch (error) {
                showError('Не удалось загрузить данные. Проверьте подключение к интернету.');
                console.error('Error:', error);
            }
        }
        
        function displayData(data) {
            console.log("🚀 ~ displayData ~ data:", data)
            
            // Устанавливаем название
            document.getElementById('title').textContent = data.title || 'Название не указано';
            
            // Устанавливаем описание
            document.getElementById('description').textContent = data.description || 'Описание отсутствует';
            
            // Устанавливаем обложку
            const coverElement = document.getElementById('cover');
            if (data.coverUrl && data.coverUrl !== '') {
                const img = new Image();
                img.onload = function() {
                    coverElement.style.backgroundImage = `url('${data.coverUrl}')`;
                    coverElement.classList.remove('error');
                };
                img.onerror = function() {
                    console.log('Ошибка загрузки обложки');
                    coverElement.classList.add('error');
                    coverElement.style.backgroundImage = '';
                };
                img.src = data.coverUrl;
            } else {
                coverElement.classList.add('error');
            }
            
            // Устанавливаем логотип
            const logoElement = document.getElementById('logo');
            if (data.logoUrl && data.logoUrl !== '') {
                const img = new Image();
                img.onload = function() {
                    logoElement.style.backgroundImage = `url('${data.logoUrl}')`;
                    logoElement.classList.remove('error');
                    logoElement.textContent = '';
                };
                img.onerror = function() {
                    console.log('Ошибка загрузки логотипа');
                    logoElement.classList.add('error');
                    logoElement.style.backgroundImage = '';
                    logoElement.textContent = '📷';
                };
                img.src = data.logoUrl;
            } else {
                logoElement.classList.add('error');
                logoElement.textContent = '📷';
            }
            
            // СОЗДАЕМ КНОПКИ - ИСПРАВЛЕННАЯ ЛОГИКА
            const buttonsContainer = document.getElementById('buttonsContainer');
            buttonsContainer.innerHTML = '';
            
            // Создаем карту цветов для быстрого доступа
            const colorMap = {};
            if (data.colors && Array.isArray(data.colors)) {
                data.colors.forEach(colorItem => {
                    if (colorItem.name && colorItem.code) {
                        colorMap[colorItem.name.toLowerCase()] = colorItem.code;
                    }
                });
            }
            
            // Добавляем стандартные цвета на случай, если их нет в colorMap
            const defaultColors = {
                'красный': '#FF4444',
                'синий': '#007AFF',
                'зеленый': '#4CAF50',
                'желтый': '#FFD700',
                'оранжевый': '#FF9800'
            };
            
            Object.assign(colorMap, defaultColors);
            
            if (data.buttons && data.buttons.length > 0) {
                console.log("🚀 ~ displayData ~ data:", data)
                data.buttons.forEach((button, index) => {
                    const buttonElement = document.createElement('a');
                    
                    // ПРАВИЛЬНО: текст кнопки - это button.text, ссылка - button.url
                    buttonElement.textContent = button.text;
                    buttonElement.href = button.url;
                    // buttonElement.target = '_blank';
                    buttonElement.rel = 'noopener noreferrer';
                    buttonElement.className = 'button';
                    
                    // Определяем цвет для кнопки
                    let buttonColor = button.color || 'синий';
                    
                    // Если цвет указан как имя, ищем в карте цветов
                    if (buttonColor && !buttonColor.startsWith('#') && !buttonColor.startsWith('linear-gradient')) {
                        const colorKey = buttonColor.toLowerCase().trim();
                        if (colorMap[colorKey]) {
                            buttonColor = colorMap[colorKey];
                        } else {
                            // Если цвет не найден, используем синий
                            buttonColor = '#007AFF';
                        }
                    }
                    
                    // Если цвет - это градиент
                    if (buttonColor && buttonColor.startsWith('linear-gradient')) {
                        buttonElement.style.background = buttonColor;
                    } else {
                        buttonElement.style.backgroundColor = buttonColor;
                        buttonElement.style.background = buttonColor;
                    }
                    
                    // Проверка на валидность URL (не должен быть цветом)
                    if (button.url && (button.url.startsWith('#') || button.url.startsWith('linear-gradient'))) {
                        console.warn('Неверная ссылка для кнопки:', button.text, button.url);
                        buttonElement.style.opacity = '0.6';
                        buttonElement.style.cursor = 'not-allowed';
                        buttonElement.href = '#';
                        buttonElement.onclick = (e) => {
                            e.preventDefault();
                            alert('Ссылка для этой кнопки настроена некорректно');
                        };
                    }
                    
                    buttonsContainer.appendChild(buttonElement);
                });
            } else {
                buttonsContainer.innerHTML = '<p style="text-align: center; color: #999; padding: 30px;">Нет доступных кнопок</p>';
            }
            
            // Показываем время последнего обновления
            // if (data.lastUpdate) {
            //     const updateDate = new Date(data.lastUpdate);
            //     document.getElementById('lastUpdate').textContent = `Обновлено: ${updateDate.toLocaleDateString()} ${updateDate.toLocaleTimeString()}`;
            // }
        }
        
        function showError(message) {
            const container = document.getElementById('buttonsContainer');
            container.innerHTML = `
                <div class="error">
                    <i>⚠️</i>
                    <h3>Ошибка</h3>
                    <p>${message}</p>
                    <button onclick="loadData()" style="
                        margin-top: 20px;
                        padding: 10px 30px;
                        background: #667eea;
                        color: white;
                        border: none;
                        border-radius: 25px;
                        cursor: pointer;
                        font-size: 16px;
                    ">Повторить</button>
                </div>
            `;
        }
        
        // Загружаем данные при открытии страницы
        document.addEventListener('DOMContentLoaded', loadData);
        
        // Обновляем данные каждые 5 минут
        setInterval(loadData, 300000);
    </script>
</body>
</html>
